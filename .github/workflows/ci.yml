name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          components: clippy,rustfmt
          toolchain: "1.95.0"
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo audit
        uses: actions-rust-lang/audit@v1
      - name: cargo machete
        run: command -v cargo-machete || cargo install cargo-machete --locked && cargo machete
      - name: cargo outdated
        run: command -v cargo-outdated || cargo install cargo-outdated --locked && cargo outdated --root-deps-only

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test
