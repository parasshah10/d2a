name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Lint frontend
        run: npm run lint
        working-directory: web
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error

  check:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          components: clippy,rustfmt
          toolchain: "1.95.0"
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo audit
        uses: actions-rust-lang/audit@v1
      - name: cargo machete
        run: command -v cargo-machete || cargo install cargo-machete --locked && cargo machete
      - name: cargo outdated
        run: command -v cargo-outdated || cargo install cargo-outdated --locked && cargo outdated --root-deps-only

  test:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test
