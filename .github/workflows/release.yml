name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: web/.node-version
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error
  build-linux-gnu:
    needs: [build-frontend]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}
      - name: Install build dependencies (aarch64)
        if: ${{ matrix.runner == 'ubuntu-24.04-arm' }}
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          name="ds-free-api-${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/ds-free-api" "$name/"
          cp LICENSE README.md README.en.md config.example.toml "$name/"
          tar czf "$name.tar.gz" "$name"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.suffix }}
          path: "*.tar.gz"
          if-no-files-found: error

  build-linux-musl:
    needs: [build-frontend]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            suffix: linux-x86_64-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            suffix: linux-aarch64-musl
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}
      - name: Install musl build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ musl-tools
      - name: Configure musl target (aarch64 native only)
        if: ${{ matrix.runner == 'ubuntu-24.04-arm' }}
        env:
          TARGET: ${{ matrix.target }}
        run: |
          TARGET_US="${TARGET//-/_}"
          TARGET_US="${TARGET_US^^}"
          echo "CC_${TARGET_US}=musl-gcc" >> "$GITHUB_ENV"
          echo "CXX_${TARGET_US}=musl-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_${TARGET_US}_LINKER=musl-gcc" >> "$GITHUB_ENV"
          echo "CC=musl-gcc" >> "$GITHUB_ENV"
          echo "CXX=musl-gcc" >> "$GITHUB_ENV"
          echo "CMAKE_C_COMPILER=musl-gcc" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER=musl-gcc" >> "$GITHUB_ENV"
          echo "CFLAGS=-U_FORTIFY_SOURCE" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-U_FORTIFY_SOURCE" >> "$GITHUB_ENV"
      - name: Install cross (x86_64 only)
        if: ${{ matrix.runner == 'ubuntu-latest' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build (x86_64 musl via cross)
        if: ${{ matrix.runner == 'ubuntu-latest' }}
        run: cross build --release --target ${{ matrix.target }}
      - name: Build (aarch64 musl native)
        if: ${{ matrix.runner == 'ubuntu-24.04-arm' }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          name="ds-free-api-${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/ds-free-api" "$name/"
          cp LICENSE README.md README.en.md config.example.toml "$name/"
          tar czf "$name.tar.gz" "$name"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.suffix }}
          path: "*.tar.gz"
          if-no-files-found: error

  build-macos:
    needs: [build-frontend]
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            suffix: macos-aarch64
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          name="ds-free-api-${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/ds-free-api" "$name/"
          cp LICENSE README.md README.en.md config.example.toml "$name/"
          tar czf "$name.tar.gz" "$name"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.suffix }}
          path: "*.tar.gz"
          if-no-files-found: error

  build-windows:
    needs: [build-frontend]
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
          - target: aarch64-pc-windows-msvc
            suffix: windows-aarch64
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Resolve tag
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ github.event.inputs.tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "tag=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: |
          $name = "ds-free-api-${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}"
          New-Item -ItemType Directory -Force -Path $name
          Copy-Item "target/${{ matrix.target }}/release/ds-free-api.exe" "$name/"
          Copy-Item LICENSE, README.md, README.en.md, config.example.toml "$name/"
          Compress-Archive -Path $name -DestinationPath "$name.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.suffix }}
          path: "*.zip"
          if-no-files-found: error

  docker:
    needs: [build-linux-musl]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: linux-x86_64-musl
          path: dist/

      - name: Extract binary to Dockerfile path
        run: |
          tar xzf dist/*.tar.gz -C /tmp
          mkdir -p target/x86_64-unknown-linux-musl/release
          cp /tmp/ds-free-api-*/ds-free-api target/x86_64-unknown-linux-musl/release/ds-free-api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ds-free-api:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/ds-free-api:latest

  release:
    needs: [build-linux-gnu, build-linux-musl, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="${{ steps.meta.outputs.tag }}"
          TAG_VERSION="${TAG#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Mismatch: Cargo.toml version=$CARGO_VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Extract changelog
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#v}"
          awk "/## \[$VERSION\]/{flag=1;next}/## \[/{flag=0}flag" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for $VERSION"
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten structure
        run: |
          find dist -mindepth 2 -type f -exec mv -t dist/ {} +
          find dist -mindepth 1 -type d -empty -delete

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > ../SHA256SUMS
          mv ../SHA256SUMS .

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: false
          body_path: release_notes.md
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
