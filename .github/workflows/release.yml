name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux-gnu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64-gnu
          - target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package
        run: |
          name="ds-free-api-${{ github.ref_name }}-${{ matrix.suffix }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/ds-free-api" "$name/"
          cp LICENSE README.md README.en.md config.example.toml "$name/"
          tar czf "$name.tar.gz" "$name"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: "*.tar.gz"
          if-no-files-found: error

  build-linux-musl:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            suffix: linux-x86_64-musl
          - target: aarch64-unknown-linux-musl
            suffix: linux-aarch64-musl
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          else
            sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          name="ds-free-api-${{ github.ref_name }}-${{ matrix.suffix }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/ds-free-api" "$name/"
          cp LICENSE README.md README.en.md config.example.toml "$name/"
          tar czf "$name.tar.gz" "$name"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: "*.tar.gz"
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            suffix: macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          name="ds-free-api-${{ github.ref_name }}-${{ matrix.suffix }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/ds-free-api" "$name/"
          cp LICENSE README.md README.en.md config.example.toml "$name/"
          tar czf "$name.tar.gz" "$name"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: "*.tar.gz"
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
          - target: aarch64-pc-windows-msvc
            suffix: windows-aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: |
          $name = "ds-free-api-${{ github.ref_name }}-${{ matrix.suffix }}"
          New-Item -ItemType Directory -Force -Path $name
          Copy-Item "target/${{ matrix.target }}/release/ds-free-api.exe" "$name/"
          Copy-Item LICENSE, README.md, README.en.md, config.example.toml "$name/"
          Compress-Archive -Path $name -DestinationPath "$name.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: "*.zip"
          if-no-files-found: error

  release:
    needs: [build-linux-gnu, build-linux-musl, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten structure
        run: |
          find dist -mindepth 2 -type f -exec mv -t dist/ {} +
          find dist -mindepth 1 -type d -empty -delete
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > ../SHA256SUMS
          mv ../SHA256SUMS .
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
