[deepseek]
# 工具调用标签配置
# 内置模糊匹配：全角 `｜`(U+FF5C) 与 `▁`(U+2581) 分别等价于 ASCII `|` 和 `_`，
# 自动覆盖大多数字符级幻觉变体。
# extra 用于格式完全不同的回退标签（如 <tool_call>）：
# tool_call.extra_starts = ["<|tool_call_begin|>", "<tool_calls>", "<tool_call>"]
# tool_call.extra_ends = ["<|tool_call_end|>", "</tool_calls>", "</tool_call>"]

# 已验证通过的 User-Agent
# user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36"

# API 基础地址（默认）
# api_base = "https://chat.deepseek.com/api/v0"

# WASM 文件完整 URL（PoW 计算所需，版本号会变动，建议手动更新）
# wasm_url = "https://fe-static.deepseek.com/chat/static/sha3_wasm_bg.7b9ca65ddd.wasm"

# X-Client-Version 请求头（用于 expert 模型等功能）
# client_version = "2.0.0"

# X-Client-Platform 请求头
# client_platform = "web"

# 支持的模型类型列表，默认值为 ["default", "expert"]
# 每种类型会自动映射为 OpenAI 的 model_id：deepseek-<type>
# model_types = ["default", "expert"]
# max_input_tokens = [1048576, 1048576]
# max_output_tokens = [384000, 384000]

# 代理配置（可选，绕过 CloudFront WAF 地区限制）
# 使用非美国地区的代理出口节点可避免 WAF Challenge
# [proxy]
# url = "http://127.0.0.1:7890"
# url = "socks5://127.0.0.1:7891"
# 模型别名（可选，按 index 对齐 model_types，默认无别名）
# 如 model_types = ["default", "expert"], model_aliases = ["", "deepseek-v4-pro"]
# 则仅 deepseek-v4-pro → expert（index 1），空字符串被跳过
# model_aliases = []

